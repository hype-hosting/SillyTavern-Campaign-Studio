<div class="cs-settings">
    <div class="cs-settings-section">
        <div class="cs-settings-section-title">Campaign Studio</div>

        <div class="cs-settings-row">
            <label class="cs-settings-label" for="cs-settings-enabled">Enable Extension</label>
            <input type="checkbox" id="cs-settings-enabled" />
        </div>

        <div class="cs-settings-row">
            <label class="cs-settings-label" for="cs-settings-preset">Active Preset</label>
            <select id="cs-settings-preset" class="cs-settings-select">
                <!-- Populated dynamically -->
            </select>
        </div>

        <div class="cs-settings-row">
            <label class="cs-settings-label" for="cs-settings-position">Panel Position</label>
            <select id="cs-settings-position" class="cs-settings-select">
                <option value="right">Right</option>
                <option value="left">Left</option>
                <option value="bottom">Bottom</option>
            </select>
        </div>
    </div>

    <div class="cs-settings-section">
        <div class="cs-settings-section-title">Appearance</div>

        <div class="cs-settings-row">
            <label class="cs-settings-label" for="cs-settings-accent">Accent Color</label>
            <input type="color" id="cs-settings-accent" value="#7c6bde" />
        </div>
    </div>

    <div class="cs-settings-section">
        <div class="cs-settings-section-title">Mechanics</div>

        <div class="cs-settings-row">
            <label class="cs-settings-label" for="cs-settings-dice">Dice Roller</label>
            <input type="checkbox" id="cs-settings-dice" />
        </div>
    </div>
</div>
