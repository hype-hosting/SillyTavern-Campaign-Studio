<div class="cs-settings">
    <div class="cs-settings-section">
        <div class="cs-settings-section-title">Campaign Studio</div>

        <div class="cs-settings-row">
            <label class="cs-settings-label" for="cs-settings-enabled">Enable Extension</label>
            <input type="checkbox" id="cs-settings-enabled" />
        </div>

        <div class="cs-settings-row">
            <label class="cs-settings-label" for="cs-settings-preset">Active Preset</label>
            <div class="cs-settings-preset-row">
                <select id="cs-settings-preset" class="cs-settings-select">
                    <!-- Populated dynamically -->
                </select>
                <button id="cs-btn-edit-preset" class="cs-settings-preset-btn" title="Edit preset">&#9998;</button>
                <button id="cs-btn-new-preset" class="cs-settings-preset-btn" title="New preset">+</button>
                <button id="cs-btn-import-preset" class="cs-settings-preset-btn" title="Import preset JSON">&#8593;</button>
            </div>
            <input type="file" id="cs-import-file" accept=".json" style="display:none" />
        </div>

        <div class="cs-settings-row">
            <label class="cs-settings-label" for="cs-settings-position">Panel Position</label>
            <select id="cs-settings-position" class="cs-settings-select">
                <option value="right">Right</option>
                <option value="left">Left</option>
                <option value="bottom">Bottom</option>
            </select>
        </div>
    </div>

    <div class="cs-settings-section">
        <div class="cs-settings-section-title">Appearance</div>

        <div class="cs-settings-row">
            <label class="cs-settings-label" for="cs-settings-accent">Accent Color</label>
            <input type="color" id="cs-settings-accent" value="#7c6bde" />
        </div>
    </div>

    <div class="cs-settings-section">
        <div class="cs-settings-section-title">Mechanics</div>

        <div class="cs-settings-row">
            <label class="cs-settings-label" for="cs-settings-dice">Dice Roller</label>
            <input type="checkbox" id="cs-settings-dice" />
        </div>
    </div>

    <div class="cs-settings-section">
        <div class="cs-settings-section-title">AI Integration</div>

        <div class="cs-settings-row">
            <label class="cs-settings-label" for="cs-settings-injection-system">Prompt Injection</label>
            <input type="checkbox" id="cs-settings-injection-system" />
            <small class="cs-settings-hint">Inject YAML schema instructions into the system prompt</small>
        </div>

        <div class="cs-settings-row">
            <label class="cs-settings-label" for="cs-settings-injection-state">State Context</label>
            <input type="checkbox" id="cs-settings-injection-state" />
            <small class="cs-settings-hint">Send current game state to the AI before each message</small>
        </div>

        <div class="cs-settings-row">
            <label class="cs-settings-label" for="cs-settings-output-format">Output Format</label>
            <select id="cs-settings-output-format" class="cs-settings-select">
                <option value="yaml">YAML Drawers</option>
                <option value="details">Details Blocks (legacy)</option>
                <option value="both">Both</option>
            </select>
        </div>

        <div class="cs-settings-row cs-settings-row-full">
            <div class="cs-settings-rules-header">
                <label class="cs-settings-label">Game Rules</label>
                <small class="cs-settings-rules-count" id="cs-rules-count"></small>
            </div>
            <small class="cs-settings-hint">Toggle rules injected into the AI prompt. Each preset includes ready-to-use rules.</small>
            <div id="cs-rules-container" class="cs-rules-container">
                <!-- Dynamically populated with rule cards -->
            </div>
            <div class="cs-rules-custom-section">
                <label class="cs-rules-custom-label">Your Rules</label>
                <textarea id="cs-settings-rules-custom" class="cs-settings-textarea cs-settings-textarea-sm" rows="3" placeholder="Add extra rules specific to your campaign..."></textarea>
            </div>
        </div>
    </div>
</div>
